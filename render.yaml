services:
  - type: web
    name: q2
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --workers 1 --threads 8 --timeout 120
    envVars:
      - key: PYTHON_VERSION
        value: 3.9.0
      - key: CLIENT_ID
        sync: false
      - key: ACCESS_TOKEN
        sync: false
      - key: OPEN_ID
        sync: false
